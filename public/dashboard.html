<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | QuizCert Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">QuizCert</div>
            <nav id="sidebar-nav">
                <!-- Role-based navigation will be injected here -->
            </nav>
            <div style="margin-top: auto; padding: 20px;">
                <div id="user-info" style="margin-bottom: 15px; font-size: 0.9rem; opacity: 0.7;"></div>
                <button id="logout-btn" class="btn btn-outline" style="padding: 10px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="mb-4" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="page-title">Dashboard</h2>
                <div id="header-actions"></div>
            </header>

            <div id="view-container">
                <!-- Dynamic content goes here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="glass-card modal-content" id="modal-container">
            <!-- Modal content injected here -->
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Scripts -->
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
